name: Unified Release (Maven & Docs)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages:    write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Git and permissions
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force
          chmod +x mvnw


      - name: Increment Version
        id: bump_version
        run: |
          # Get current version from pom.xml robustly
          # We use help:evaluate and filter for the version string format
          RAW_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout | grep -E '^[0-9]+\.[0-9]+\.[0-9]+(-SNAPSHOT)?$' | head -n 1 | tr -d '[:space:]')
          
          if [ -z "$RAW_VERSION" ]; then
            echo "Failed to extract version from pom.xml. Falling back to simple evaluation."
            RAW_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout | tr -d '[:space:]')
          fi
          
          # Strip -SNAPSHOT if present
          BASE_VERSION=${RAW_VERSION%-SNAPSHOT}
          echo "Current version baseline: $BASE_VERSION"
          
          NEW_VERSION=$BASE_VERSION
          while true; do
            # Increment patch version (assuming x.y.z format)
            if [[ $NEW_VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR=${BASH_REMATCH[1]}
              MINOR=${BASH_REMATCH[2]}
              PATCH=${BASH_REMATCH[3]}
              PATCH=$((PATCH + 1))
              NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            else
              NEW_VERSION="${NEW_VERSION}.1"
            fi
            
            echo "Checking if tag v$NEW_VERSION exists..."
            if ! git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; then
              echo "Tag v$NEW_VERSION is available."
              break
            fi
            echo "Tag v$NEW_VERSION already exists, trying next one..."
          done
          
          echo "Final NEW_VERSION: $NEW_VERSION"
          ./mvnw versions:set -DnewVersion=$NEW_VERSION -DgenerateBackupPoms=false
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Generate Javadoc for Website
        run: |
          ./mvnw javadoc:javadoc -DskipTests
          # Ensure javadoc directory exists and is in the public folder so VitePress picks it up
          mkdir -p docs/public/javadoc
          cp -r docs/javadoc/* docs/public/javadoc/ || true

      - name: Build VitePress docs
        run: |
          npm ci
          npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Publish to Maven Central Portal
        run: |
          ./mvnw clean deploy -Prelease -DskipTests -Dgpg.passphrase="${GPG_PASSPHRASE}" \
            "-Dgpg.executable=gpg" "-Dgpg.pinentry-mode=loopback"
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      # - name: Commit and Push Version Bump
      #   run: |
      #     git add pom.xml
      #     # Only commit if there are changes
      #     if ! git diff --cached --quiet; then
      #       git commit -m "chore: release v${{ env.NEW_VERSION }} [skip ci]"
      #       # Rebase onto main to avoid conflicts and push
      #       git pull origin main --rebase
      #       git push origin HEAD:main
      #     fi
      #     # Tag and push tags separately to ensure they apply to the new commit
      #     git tag -f v${{ env.NEW_VERSION }}
      #     git push origin --tags --force

  deploy-docs:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

