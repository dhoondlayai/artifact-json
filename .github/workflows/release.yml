name: Unified Release (Maven & Docs)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Git and permissions
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force
          chmod +x mvnw

      - name: Get Current Version
        id: current_version
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout 2>/dev/null | tail -n 1 | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Increment Version
        id: bump_version
        run: |
          CURRENT_VERSION=${{ steps.current_version.outputs.version }}
          echo "Processing version: $CURRENT_VERSION"
          
          # Strip -SNAPSHOT suffix if present
          BASE_VERSION=${CURRENT_VERSION%-SNAPSHOT}
          echo "Base version: $BASE_VERSION"
          
          # Parse version components (assuming semantic versioning x.y.z)
          if [[ $BASE_VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR=${BASH_REMATCH[1]}
            MINOR=${BASH_REMATCH[2]}
            PATCH=${BASH_REMATCH[3]}
            
            # Increment patch version
            PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            echo "Calculated new version: $NEW_VERSION"
          else
            echo "ERROR: Version format is invalid. Expected x.y.z, got: $BASE_VERSION"
            exit 1
          fi
          
          # Verify the tag doesn't already exist
          if git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; then
            echo "WARNING: Tag v$NEW_VERSION already exists!"
            exit 1
          fi
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version bump successful: $BASE_VERSION -> $NEW_VERSION"

      - name: Update Version in pom.xml
        run: |
          ./mvnw versions:set -DnewVersion=${{ steps.bump_version.outputs.version }} -DgenerateBackupPoms=false
          echo "Updated pom.xml to version: ${{ steps.bump_version.outputs.version }}"

      - name: Generate Javadoc for Website
        run: |
          ./mvnw javadoc:javadoc -DskipTests
          mkdir -p docs/public/javadoc
          cp -r target/site/apidocs/* docs/public/javadoc/ || true

      - name: Build VitePress docs
        run: |
          npm ci
          npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Publish to Maven Central Portal
        run: |
          ./mvnw clean deploy -Prelease -DskipTests -Dgpg.passphrase="${GPG_PASSPHRASE}" \
            -Dgpg.executable=gpg -Dgpg.pinentry-mode=loopback
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Commit and Push Version Bump
        run: |
          git add pom.xml
          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: release v${{ steps.bump_version.outputs.version }} [skip ci]"
            git push origin HEAD:main
            echo "Committed version bump to main"
          else
            echo "No changes to commit"
          fi

      - name: Create and Push Git Tag
        run: |
          git tag -a v${{ steps.bump_version.outputs.version }} -m "Release v${{ steps.bump_version.outputs.version }}"
          git push origin v${{ steps.bump_version.outputs.version }}
          echo "Created and pushed tag: v${{ steps.bump_version.outputs.version }}"

  deploy-docs:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
